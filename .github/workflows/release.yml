name: Release (Tauri desktop)

# 태그 push (v*) 또는 수동 실행 시 macOS / Windows 데스크톱 위젯을 빌드해
# 하나의 GitHub Release에 .dmg / .exe 산출물을 업로드한다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 먼저 draft 릴리스 하나를 만들고, 빌드 잡들이 같은 릴리스에 업로드한다.
  # (mac/win 잡이 각자 릴리스를 만들어 중복 draft가 생기던 레이스 방지)
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const refType = process.env.GITHUB_REF_TYPE;
            const tag = refType === 'tag'
              ? process.env.GITHUB_REF_NAME
              : `v0.0.0-run${context.runNumber}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `페이틱 위젯 ${tag}`,
              body: '실시간 월급 카운터 데스크톱 위젯. macOS는 .dmg, Windows는 .exe를 받으세요.',
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        # npm ci 대신 install: Tailwind v4 등 플랫폼별 옵션 의존성(@emnapi/* 등)이
        # 단일 플랫폼에서 생성된 lock 파일에 빠져 있어도 OS별로 해소되도록 한다.
        run: npm install

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
